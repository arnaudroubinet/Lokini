# === Lokini Server Configuration ===

# --- Database ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=lokini
quarkus.datasource.password=lokini
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/lokini
quarkus.hibernate-orm.database.generation=none

# --- Liquibase ---
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.cors=true

# --- OpenTelemetry ---
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# --- Retention (configurable) ---
lokini.retention.max-days=90
lokini.retention.max-deltas-per-device=5000

# --- Rate limiting ---
lokini.rate-limit.requests-per-minute=60

# --- Device limits ---
lokini.document.max-devices=40

# --- Invitation tokens ---
lokini.invitation.default-ttl-hours=1
