version: 2

updates:
  # NPM — root monorepo (pnpm workspaces)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # NPM — @lokini/core
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # NPM — @lokini/web
  - package-ecosystem: "npm"
    directory: "/packages/web"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # Maven — Java Quarkus server
  - package-ecosystem: "maven"
    directory: "/server"
    schedule:
      interval: "weekly"
    groups:
      quarkus:
        patterns:
          - "io.quarkus*"
      test-dependencies:
        dependency-type: "development"

  # Docker — server Dockerfile
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
