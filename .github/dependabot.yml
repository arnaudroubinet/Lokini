version: 2

registries: {}

updates:
  # NPM — root monorepo (pnpm workspaces)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "arnaudroubinet"
    labels:
      - "dependencies"
      - "npm"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # NPM — @lokini/core
  - package-ecosystem: "npm"
    directory: "/packages/core"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "arnaudroubinet"
    labels:
      - "dependencies"
      - "npm"
      - "core"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # NPM — @lokini/web
  - package-ecosystem: "npm"
    directory: "/packages/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "arnaudroubinet"
    labels:
      - "dependencies"
      - "npm"
      - "web"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  # Maven — Java Quarkus server
  - package-ecosystem: "maven"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "arnaudroubinet"
    labels:
      - "dependencies"
      - "maven"
      - "server"
    groups:
      quarkus:
        patterns:
          - "io.quarkus*"
      test-dependencies:
        dependency-type: "development"

  # Docker — server Dockerfile
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "arnaudroubinet"
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    reviewers:
      - "arnaudroubinet"
    labels:
      - "dependencies"
      - "github-actions"
