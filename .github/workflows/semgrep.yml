name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif
        env:
          SEMGREP_RULES: >-
            p/default
            p/javascript
            p/typescript
            p/java
            p/security-audit
            p/secrets
            p/owasp-top-ten

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep
