name: Trivy

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "server/**"
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - "server/**"
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  # Scan the Docker image for vulnerabilities
  container-scan:
    name: Trivy — Container Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build server JAR
        working-directory: server
        run: mvn package -DskipTests -B

      - name: Build Docker image
        run: docker build -t lokini-server:scan -f docker/Dockerfile.server .

      - name: Run Trivy (image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "lokini-server:scan"
          format: "sarif"
          output: "trivy-image-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload SARIF (image)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  # Scan the filesystem / dependencies for vulnerabilities
  fs-scan:
    name: Trivy — Filesystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload SARIF (filesystem)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs
