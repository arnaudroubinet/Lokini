services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/lokini
      QUARKUS_DATASOURCE_USERNAME: lokini
      QUARKUS_DATASOURCE_PASSWORD: lokini
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lokini
      POSTGRES_USER: lokini
      POSTGRES_PASSWORD: lokini
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lokini"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
