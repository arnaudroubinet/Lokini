services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lokini
      POSTGRES_USER: lokini
      POSTGRES_PASSWORD: lokini
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lokini"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
